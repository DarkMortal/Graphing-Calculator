<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./math.js" type="text/javascript"></script>
    <title>Graphing Calculator using Javascript and HTML5</title>
    <style>
        #canvas1{
            background-color: white; 
            position: absolute;       
        }
        #canvas2{
            background-color: transparent;
            position: absolute;
            z-index: 10;
        }
        #canvas3{
            background-color: transparent;
            position: absolute;
            z-index: 5;
        }
        #canvas4{
            background-color: transparent;
            position: absolute;
            z-index: 6;
        }
        body{
            width: 100%;
            height: 100%;
            overflow: scroll;
            display: flex;
        }
        #container{
            position: relative;
            height: 100vh;
            width: 70%;
            float: right;
            overflow: auto;
            flex-grow: 1;
        }
    </style>
</head>
<body bgcolor="#061f3b">
    <div class="input" style="background-color: #061f3b; width: 30%;">
        <span style="text-align: center; color: white;"><h1><b>Graphing Calculator by Saptarshi Dey</b></h1></span>
        <div style="margin: 5px; padding: 2px; text-align: center;">
            <input type="text" id="expression" placeholder="Enter expression"/><br/>
            <input type="text" id="color" placeholder="Enter color"/><br/><br/>
            <button onclick="DRAW()">Draw Graph</button><button onclick="CLEAR()">Clear Graph</button><br/><br/>
            <input type="text" id="expression2" placeholder="Enter expression"/><br/>
            <input type="text" id="color2" placeholder="Enter color"/><br/><br/>
            <button onclick="DRAW2()">Draw Graph</button><button onclick="CLEAR2()">Clear Graph</button>
        </div>
    </div>
    <div id="container">
        <canvas id="canvas1" width="1000" height="1000"></canvas>
        <canvas id="canvas3" width="1000" height="1000"></canvas>
        <canvas id="canvas4" width="1000" height="1000"></canvas>
        <canvas id="canvas2" width="1000" height="1000"></canvas>
    </div>
    <script src="./canvas.js"></script>
</body>
</html>
